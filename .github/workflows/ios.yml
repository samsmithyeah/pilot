name: iOS Agent

on:
  push:
    branches: [main]
    paths:
      - 'ios-agent/**'
      - 'packages/tapsmith-core/src/ios/**'
      - 'packages/tapsmith-core/src/agent_comms.rs'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios-agent/**'
      - 'packages/tapsmith-core/src/ios/**'
      - 'packages/tapsmith-core/src/agent_comms.rs'
      - '.github/workflows/ios.yml'

concurrency:
  group: ios-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS Agent
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-agent
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project
        run: |
          brew install xcodegen 2>/dev/null || true
          ./create-xcode-project.sh

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project TapsmithAgent.xcodeproj \
            -scheme TapsmithAgentUITests \
            -destination 'generic/platform=iOS Simulator' \
            -quiet

      - name: SwiftLint
        run: |
          if command -v swiftlint &>/dev/null; then
            swiftlint lint --strict TapsmithAgent/
          else
            echo "SwiftLint not installed, skipping"
          fi

      # Run tapsmith-core's Rust tests on macOS so the macOS-gated iOS modules
      # (patch_xctestrun, simctl/devicectl wrappers) actually get exercised in
      # CI. The main ci.yml rust job runs on Linux and skips these tests.
      - name: Install protoc
        run: brew install protobuf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tapsmith-core
      - name: Cargo test (tapsmith-core, macOS)
        working-directory: packages/tapsmith-core
        run: cargo test
